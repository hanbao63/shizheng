function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function shortName(name){
  var s=name.replace(/\.pdf$/i,'');
  var m=s.match(/(\d+)年(\d+月\d+日)时政积累/);
  if(m) return '<span class="date">'+esc(m[2])+'</span>';
  s=s.replace(/^2026年/,'').replace(/^2025年/,'');
  s=s.replace('时政热点汇总','热点汇总').replace('（考试必看）','');
  return esc(s);
}

function render(){
  var root=document.getElementById('root');
  root.innerHTML='';
  TREE.children.forEach(function(dir){
    var section=document.createElement('div');
    section.className='dir-section';
    
    var dirFiles=[];
    function collect(n){if(n.c) n.c.forEach(collect); else dirFiles.push(n);}
    if(dir.c) dir.c.forEach(collect);
    
    var title=document.createElement('div');
    title.className='dir-title';
    title.innerHTML='<span>📁 '+esc(dir.n)+'</span><span class="cnt">'+dirFiles.length+'</span>';
    title.addEventListener('click',function(){section.querySelector('.sub-dir').classList.toggle('open');title.querySelector('.arrow').classList.toggle('open')});
    section.appendChild(title);
    
    var subDiv=document.createElement('div');
    subDiv.className='sub-dir';
    
   dir.c.forEach(function(sub){
     if(sub.c){
       var subFiles=[];
       function collect2(n){if(n.c) n.c.forEach(collect2); else subFiles.push(n);}
       if(sub.c) sub.c.forEach(collect2);
        
       var st=document.createElement('div');
       st.className='sub-dir-title';
       st.innerHTML='📁 '+esc(sub.n)+' <span class="cnt">'+subFiles.length+'</span>';
       st.addEventListener('click',function(){st.nextElementSibling.classList.toggle('open');st.querySelector('.arrow').classList.toggle('open')});
       subDiv.appendChild(st);
       
       var fdiv=document.createElement('div');
       fdiv.className='files';
       sub.c.forEach(function(f){
         var a=document.createElement('a');
         a.href=f.p;
         a.target='_blank';
         a.innerHTML=shortName(f.n);
         fdiv.appendChild(a);
       });
       subDiv.appendChild(fdiv);
      }else{
        var a=document.createElement('a');
        a.href=sub.p;
        a.target='_blank';
        a.innerHTML=shortName(sub.n);
        subDiv.appendChild(a);
     }
   });
    
    section.appendChild(subDiv);
    root.appendChild(section);
  });
}

document.getElementById('search').addEventListener('input',function(){
  var q=this.value.trim().toLowerCase();
  var links=document.querySelectorAll('a');
  var sections=document.querySelectorAll('.dir-section');
  if(!q){links.forEach(function(l){l.style.display='block'});return}
  links.forEach(function(l){
    l.style.display=l.textContent.toLowerCase().includes(q)?'block':'none';
  });
});

render();
