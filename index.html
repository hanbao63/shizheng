<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时政汇总阅读器</title>
<style>
  :root {
    --bg: #f5f0eb;
    --surface: #ffffff;
    --sidebar-bg: #ede7e0;
    --border: #ddd6ce;
    --text: #2c2c2c;
    --text-secondary: #7a6f64;
    --accent: #8b5a2b;
    --accent-light: #e8d5c0;
    --hover: #e0d6cc;
    --active-bg: #d6c8b8;
    --shadow: rgba(0,0,0,0.06);
    --radius: 10px;
    --header-h: 52px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .header h1 span { color: var(--accent); }
  .search-wrap {
    flex: 1;
    max-width: 360px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    pointer-events: none;
  }
  .search-wrap input {
    width: 100%;
    padding: 6px 12px 6px 32px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-secondary); }
  .stats {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  /* ── Main Layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    min-width: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width .25s ease, min-width .25s ease;
  }
  .sidebar.collapsed {
    width: 0;
    min-width: 0;
    border: none;
  }
  .sidebar-tree {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0 20px;
  }
  .sidebar-tree::-webkit-scrollbar { width: 4px; }
  .sidebar-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* tree nodes */
  .tree-item {
    display: flex;
    align-items: center;
    cursor: pointer;
    padding: 3px 14px;
    font-size: 13px;
    line-height: 1.6;
    user-select: none;
    transition: background .1s;
    gap: 4px;
  }
  .tree-item:hover { background: var(--hover); }
  .tree-item.active { background: var(--active-bg); color: var(--accent); font-weight: 500; }
  .tree-item .icon {
    flex-shrink: 0;
    width: 18px;
    text-align: center;
    font-size: 14px;
    color: var(--text-secondary);
  }
  .tree-item.dir .icon { color: var(--accent); }
  .tree-item .label { flex:1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tree-item .count {
    font-size: 11px;
    color: var(--text-secondary);
    background: var(--surface);
    padding: 0 6px;
    border-radius: 8px;
    line-height: 1.6;
  }
  .tree-item .arrow {
    flex-shrink: 0;
    width: 14px;
    text-align: center;
    font-size: 10px;
    color: var(--text-secondary);
    transition: transform .15s;
  }
  .tree-item .arrow.open { transform: rotate(90deg); }
  .tree-children { display: none; }
  .tree-children.open { display: block; }
  .tree-children .tree-item { padding-left: 34px; }
  .tree-children .tree-children .tree-item { padding-left: 54px; }
  .no-results {
    padding: 30px 20px;
    text-align: center;
    color: var(--text-secondary);
    font-size: 13px;
  }

  /* ── Viewer ── */
  .viewer {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
  }
  .viewer-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    gap: 12px;
    padding: 40px;
  }
  .viewer-empty svg { opacity: .25; }
  .viewer-empty h2 {
    font-size: 18px;
    font-weight: 400;
    color: var(--text-secondary);
  }
  .viewer-empty p { font-size: 13px; }
  .viewer-bar {
    height: 40px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    overflow: hidden;
  }
  .viewer-bar .file-icon { font-size: 16px; flex-shrink:0; }
  .viewer-bar .file-path {
    flex:1;
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text-secondary);
  }
  .viewer-bar .file-path strong { color: var(--text); font-weight: 500; }
  .viewer-bar .nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 10px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    transition: background .15s;
  }
  .viewer-bar .nav-btn:hover { background: var(--hover); }
  .viewer-bar .nav-btn:disabled { opacity: .3; cursor: default; }
  .viewer-frame {
    flex: 1;
    border: none;
    background: #fafafa;
  }

  /* ── Toggle ── */
  .toggle-btn {
    position: absolute;
    left: 280px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: none;
    border-radius: 0 6px 6px 0;
    width: 20px;
    height: 48px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    font-size: 12px;
    transition: left .25s ease;
    padding: 0;
  }
  .sidebar.collapsed ~ .viewer .toggle-btn,
  .sidebar.collapsed + .viewer .toggle-btn {
    left: 0;
  }
  .sidebar-wrap { position: relative; display: flex; }

  /* ── Responsive ── */
  @media (max-width: 720px) {
    .sidebar { width: 220px; }
    .toggle-btn { left: 220px; }
    .sidebar.collapsed ~ .viewer .toggle-btn,
    .sidebar.collapsed + .viewer .toggle-btn { left: 0; }
    .header h1 { font-size: 14px; }
   .search-wrap { max-width: 200px; }
 }
  @media (max-width: 500px) {
    .sidebar { position: fixed; left: 0; top: var(--header-h); bottom: 0; z-index: 20; width: 260px; box-shadow: 2px 0 12px rgba(0,0,0,0.12); }
    .sidebar.collapsed { display: none; }
    .toggle-btn { display: none; }
    .header h1 { font-size: 13px; }
    .search-wrap { max-width: 120px; }
    .viewer-bar { height: 36px; padding: 0 10px; gap: 6px; }
    .viewer-bar .nav-btn { padding: 1px 6px; font-size: 12px; }
  }
</style>
</head>

// ── Flatten all PDFs ──
function buildFlatList(node, prefix = '') {
  if (!node.children) return;
  for (const child of node.children) {
    if (child.type === 'file') {
      flatList.push(child);
    } else if (child.type === 'dir') {
      buildFlatList(child, child.name);
    }
  }
}

// ── Render tree ──
function renderTree(node, parentEl, depth) {
  if (!node.children) return;
  for (const child of node.children) {
    if (child.type === 'dir') {
      const div = document.createElement('div');
      div.className = 'tree-item dir';
      div.dataset.name = child.name;
      div.innerHTML = `
        <span class="arrow" id="arrow-${child.name.replace(/\s/g,'_')}">▶</span>
        <span class="icon">📁</span>
        <span class="label">${esc(child.name)}</span>
        <span class="count">${countPdfs(child)}</span>
      `;
      div.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleDir(child.name);
      });
      parentEl.appendChild(div);

      const container = document.createElement('div');
      container.className = 'tree-children';
      container.id = 'children-' + child.name.replace(/\s/g,'_');
      // auto-open first level
      if (depth === 0) {
        container.classList.add('open');
        div.querySelector('.arrow').classList.add('open');
      }
      parentEl.appendChild(container);
      renderTree(child, container, depth + 1);
    } else if (child.type === 'file') {
      const div = document.createElement('div');
      div.className = 'tree-item file';
      div.dataset.path = child.path;
      div.innerHTML = `
        <span class="icon" style="visibility:hidden">·</span>
        <span class="icon">📄</span>
        <span class="label">${esc(displayName(child.name))}</span>
      `;
      div.addEventListener('click', () => openFile(child.path));
      // Highlight on open
      div.addEventListener('click', function() {
        document.querySelectorAll('.tree-item.active').forEach(el => el.classList.remove('active'));
        this.classList.add('active');
      });
      parentEl.appendChild(div);
    }
  }
}

function displayName(name) {
  // Show "1月10日" instead of "2026年1月10日时政积累.pdf"
  let s = name.replace(/\.pdf$/i, '');
  // For daily files: "2026年1月10日时政积累" → "1月10日"
  const dailyMatch = s.match(/(\d+)年(\d+月\d+日)时政积累/);
  if (dailyMatch) return dailyMatch[2];
  // For 两会 files: shorten
  s = s.replace('2026年', '');
  s = s.replace('（考试必看）', '');
  s = s.replace('时政热点汇总', '热点汇总');
  return s;
}

function countPdfs(node) {
  let n = 0;
  if (node.children) {
    for (const c of node.children) {
      if (c.type === 'file') n++;
      else n += countPdfs(c);
    }
  }
  return n;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toggleDir(name) {
  const key = name.replace(/\s/g,'_');
  const container = document.getElementById('children-' + key);
  const arrow = document.getElementById('arrow-' + key);
  if (!container) return;
  container.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open');
}

// ── Open file ──
function openFile(path) {
  const idx = flatList.findIndex(f => f.path === path);
  if (idx === -1) return;
  currentIdx = idx;
  showFile(idx);
}

function showFile(idx) {
  if (idx < 0 || idx >= flatList.length) return;
  const file = flatList[idx];
  emptyState.style.display = 'none';
  viewerBar.style.display = 'flex';
  pdfFrame.style.display = 'block';
  pdfFrame.src = '/' + file.path;
  // Show clean path in bar
  const parts = file.path.split('/');
  const dir = parts.slice(0, -1).join(' / ');
  const fname = displayName(parts[parts.length-1]);
  filePath.innerHTML = `<strong>${esc(fname)}</strong>  —  ${esc(dir)}`;
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === flatList.length - 1;
  // Highlight in tree
  document.querySelectorAll('.tree-item.active').forEach(el => el.classList.remove('active'));
  const match = document.querySelector(`.tree-item.file[data-path="${file.path}"]`);
  if (match) match.classList.add('active');
  updateStats();
}

// ── Navigation ──
prevBtn.addEventListener('click', () => { if (currentIdx > 0) showFile(currentIdx - 1); });
nextBtn.addEventListener('click', () => { if (currentIdx < flatList.length - 1) showFile(currentIdx + 1); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' && currentIdx > 0 && !e.target.closest('input')) {
    showFile(currentIdx - 1);
  }
  if (e.key === 'ArrowRight' && currentIdx < flatList.length - 1 && !e.target.closest('input')) {
    showFile(currentIdx + 1);
  }
});

// ── Search ──
let searchTimer;
searchEl.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => filterTree(searchEl.value.trim()), 150);
});

function filterTree(query) {
  const items = treeEl.querySelectorAll('.tree-item');
  const dirs = treeEl.querySelectorAll('.tree-item.dir');
  const files = treeEl.querySelectorAll('.tree-item.file');

  if (!query) {
    items.forEach(el => el.style.display = 'flex');
    dirs.forEach(d => {
      const key = d.dataset.name.replace(/\s/g,'_');
      const container = document.getElementById('children-' + key);
      if (container) container.classList.add('open');
      const arrow = document.getElementById('arrow-' + key);
      if (arrow) arrow.classList.add('open');
    });
    return;
  }

  const q = query.toLowerCase();
  let hasAny = false;
  files.forEach(f => {
    const label = f.querySelector('.label');
    const match = label && label.textContent.toLowerCase().includes(q);
    f.style.display = match ? 'flex' : 'none';
    if (match) hasAny = true;
  });
  dirs.forEach(d => {
    const key = d.dataset.name.replace(/\s/g,'_');
    const container = document.getElementById('children-' + key);
    if (!container) return;
    const visible = Array.from(container.querySelectorAll('.tree-item.file')).some(f => f.style.display !== 'none');
    d.style.display = 'flex';
    container.classList.toggle('open', visible);
    const arrow = document.getElementById('arrow-' + key);
    if (arrow) arrow.classList.toggle('open', visible);
  });
  const noResults = treeEl.querySelector('.no-results');
  if (!hasAny && query) {
    if (!noResults) {
      const nr = document.createElement('div');
      nr.className = 'no-results';
      nr.textContent = `没有匹配 "${query}" 的 PDF`;
      treeEl.appendChild(nr);
    }
  } else if (noResults) {
    noResults.remove();
  }
}

function updateStats() {
  const total = flatList.length;
  const pos = currentIdx >= 0 ? currentIdx + 1 : '';
  statsEl.textContent = pos ? `${pos} / ${total} 个文件` : `${total} 个文件`;
}

// ── Toggle sidebar ──
toggleBtn.addEventListener('click', () => {
  sidebarCollapsed = !sidebarCollapsed;
  sidebar.classList.toggle('collapsed', sidebarCollapsed);
  toggleBtn.textContent = sidebarCollapsed ? '▶' : '◀';
});

// ── Init ──
loadTree();
