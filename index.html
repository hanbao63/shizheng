var total = 199;

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function shortName(name){
  var s=name.replace(/\.pdf$/i,'');
  var m=s.match(/(\d+)年(\d+月\d+日)时政积累/);
  if(m) return '<span class="date">'+esc(m[2])+'</span>';
  s=s.replace(/^2026年/,'').replace(/^2025年/,'');
  s=s.replace('时政热点汇总','热点汇总').replace('（考试必看）','');
  return esc(s);
}

function getDateNum(n){
  var m=n.match(/\d{4}年\d{1,2}月\d{1,2}日/);
  if(m){
    var p=n.split("时政积累")[0];
    p=p.replace(/年/g,' ').replace(/月/g,' ').replace(/日/g,' ').trim().split(/\s+/);
    if(p.length>=2) return parseInt(p[0])*10000+parseInt(p[1])*100+(parseInt(p[2])||0)
  }
  return 0
}
function sortFiles(a,b){
  var aN=getDateNum(a.n||a.name||''),bN=getDateNum(b.n||b.name||'');
  if(aN&&bN) return aN-bN;
  return (a.n||a.name||'').localeCompare(b.n||b.name||'')
}

// Pre-process TREE: pre-compute _count per dir, sort children once
function proc(n){if(n.c){n.c.forEach(proc);n.c.sort(sortFiles);n._count=0;n.c.forEach(function(c){n._count+=c._count!=null?c._count:1})}}
TREE.children.forEach(proc);

// Flat file index for search
var fileIndex=[];
function addToIndex(n,d,s){
  if(n.c){
    n.c.forEach(function(c){
      if(c.c) addToIndex(c,n.n,c.n);
      else addToIndex(c,d||n.n,s)
    })
  } else {
    fileIndex.push({name:n.n,path:n.p,dir:d,sub:s,el:null})
  }
}
TREE.children.forEach(function(n){addToIndex(n)});

// Lazy-render helpers
function renderFileHtml(files){
  var h='';
  for(var i=0;i<files.length;i++){var f=files[i];h+='<a href="'+esc(f.p)+'">'+shortName(f.n)+'</a>'}
  return h;
}
function registerLinks(container,files){
  var links=container.querySelectorAll('a');
  for(var i=0;i<links.length;i++){
    var path=links[i].getAttribute('href');
    for(var j=0;j<fileIndex.length;j++){if(fileIndex[j].path===path){fileIndex[j].el=links[i];break}}
  }
}

  if(subDiv._loaded){subDiv.classList.toggle('open');section.querySelector('.arrow').classList.toggle('open');return}

  dir.c.forEach(function(child){
    if(!child.c)return;
    var st=document.createElement('div');
    st.className='sub-dir-title';
    st.innerHTML='<span class="arrow">▶</span> '+esc(child.n)+' <span class="cnt">'+child._count+'</span>';
    st._data=child;
    var fdiv=document.createElement('div');
    fdiv.className='files';
    fdiv._loaded=false;
    st.addEventListener('click',function(e){e.stopPropagation();expandSub(fdiv,st,child)});
    subDiv.appendChild(st);
    subDiv.appendChild(fdiv);
  });
  // Direct files (non-sub-dir children)
  var dfs=[];
  dir.c.forEach(function(c){if(!c.c)dfs.push(c)});
  if(dfs.length){
    var fdiv=document.createElement('div');
    fdiv.className='files open';
    fdiv.innerHTML=renderFileHtml(dfs);
    subDiv.appendChild(fdiv);
    registerLinks(fdiv,dfs);
  }
  subDiv._loaded=true;
  subDiv.classList.add('open');
  section.querySelector('.arrow').classList.add('open');
}

function expandSub(fdiv,st,child){
  if(!fdiv._loaded){
    fdiv.innerHTML=renderFileHtml(child.c);
    fdiv._loaded=true;
    registerLinks(fdiv,child.c);
  }
  fdiv.classList.toggle('open');
  st.querySelector('.arrow').classList.toggle('open');
}

// Initial render: only top-level directory titles
function render(){
  var root=document.getElementById('root');
  root.innerHTML='';
  TREE.children.forEach(function(dir){
    var sec=document.createElement('div');
    sec.className='dir-section';
    var t=document.createElement('div');
    t.className='dir-title';
    t.innerHTML='<span class="arrow">▶</span> <span>'+esc(dir.n)+'</span><span class="cnt">'+dir._count+'</span>';
    t.addEventListener('click',function(){expandDir(sec,dir)});
    sec.appendChild(t);
    var s=document.createElement('div');
    s.className='sub-dir';
    s._loaded=false;
    sec.appendChild(s);
    root.appendChild(sec);
  });
}

// Search with 150ms debounce
var searchTimer=null;
document.getElementById('search').addEventListener('input',function(){
  clearTimeout(searchTimer);
  var self=this;
  searchTimer=setTimeout(function(){doSearch(self.value)},150);
});

function resetSearch(){
  document.querySelectorAll('.dir-section').forEach(function(s){s.classList.remove('hidden');s.style.display=''});
  document.querySelectorAll('.sub-dir-title').forEach(function(s){s.classList.remove('hidden')});
  document.querySelectorAll('.files').forEach(function(s){s.classList.remove('hidden')});
  document.querySelectorAll('.sub-dir').forEach(function(s){s.classList.remove('open')});
  document.querySelectorAll('.dir-title .arrow').forEach(function(a){a.classList.remove('open')});
  document.querySelectorAll('.sub-dir-title .arrow').forEach(function(a){a.classList.remove('open')});
  document.querySelectorAll('a').forEach(function(a){a.classList.remove('hidden')});
  var nr=document.getElementById('root').querySelector('div[style*="text-align"]');
  if(nr)nr.remove();
}

function doSearch(val){
  var q=val.trim().toLowerCase();
  if(!q){resetSearch();return}

  var nr=document.getElementById('root').querySelector('div[style*="text-align"]');
  if(nr)nr.remove();

  var matches=[];
  for(var i=0;i<fileIndex.length;i++){
    if(fileIndex[i].name.toLowerCase().indexOf(q)!==-1)matches.push(fileIndex[i]);
  }

  if(matches.length===0){
    document.querySelectorAll('.dir-section').forEach(function(s){s.classList.add('hidden')});
    document.getElementById('root').insertAdjacentHTML('beforeend','<div style="padding:20px;text-align:center;color:#7a6f64;font-size:13px">没有找到匹配的文件</div>');
    return;
  }

  var dirs={},subs={};
  matches.forEach(function(f){
    dirs[f.dir]=true;
    if(f.sub)subs[f.dir+'|'+f.sub]=true;
  });

  document.querySelectorAll('.dir-section').forEach(function(sec){
    var t=sec.querySelector('.dir-title');
    var nameSpan=t.querySelector('span');
    var dirName=nameSpan.textContent;
    if(dirs[dirName]){
      sec.classList.remove('hidden');
      var subDiv=sec.querySelector('.sub-dir');
      if(!subDiv._loaded){
        for(var i=0;i<TREE.children.length;i++){
          if(TREE.children[i].n===dirName){expandDir(sec,TREE.children[i]);break}
        }
      }else if(!subDiv.classList.contains('open')){
        subDiv.classList.add('open');
        sec.querySelector('.arrow').classList.add('open');
      }
      sec.querySelectorAll('.sub-dir-title').forEach(function(st){
        var childData=st._data;
        if(!childData){st.classList.add('hidden');return}
        if(subs[dirName+'|'+childData.n]){
          st.classList.remove('hidden');
          var fdiv=st.nextElementSibling;
          if(fdiv&&fdiv.classList.contains('files')){
            if(!fdiv._loaded){
              fdiv.innerHTML=renderFileHtml(childData.c);
              fdiv._loaded=true;
              registerLinks(fdiv,childData.c);
            }
            fdiv.classList.add('open');
            st.querySelector('.arrow').classList.add('open');
            var cm={};matches.forEach(function(m){if(m.dir===dirName&&m.sub===childData.n)cm[m.path]=true});
            fdiv.querySelectorAll('a').forEach(function(a){
              a.classList.toggle('hidden',!cm[a.getAttribute('href')]);
            });
          }
        }else{
          st.classList.add('hidden');
        }
      });
      // Direct files in top-level
      sec.querySelectorAll('.files').forEach(function(fd){
        if(fd.parentElement.classList.contains('sub-dir') && fd.previousElementSibling.tagName!=='DIV'){
          var cm={};matches.forEach(function(m){if(m.dir===dirName&&!m.sub)cm[m.path]=true});
          fd.querySelectorAll('a').forEach(function(a){
            a.classList.toggle('hidden',!cm[a.getAttribute('href')]);
          });
        }
      });
    }else{
      sec.classList.add('hidden');
    }
  });
}

render();
</script>
</body>
</html>
